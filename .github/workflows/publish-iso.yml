name: "发布 ISO"

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '磁盘镜像下载地址（支持 raw / gz / xz / bz2 / zip / 7z）'
        required: true
      arch:
        description: '目标架构'
        type: choice
        options:
          - amd64
          - arm64
        default: amd64
      release_name:
        description: '发布名称'
        required: true
      compress_format:
        description: '输出压缩格式'
        type: choice
        options:
          - gz
          - xz
          - bz2
          - zip
          - 7z
        default: gz
      secure_boot:
        description: '启用 Secure Boot'
        type: boolean
        default: false
      # use_tui:
      #   description: '使用 TUI'
      #   type: boolean
      #   default: true
      free_space:
        description: '释放 Action 空间'
        type: boolean
        default: false
      no_cache:
        description: '不使用缓存，强制重新构建'
        type: boolean
        default: false
      sha256:
        description: 'SHA256 校验值（可选）'
        required: false

env:
  TARGET: ${{ github.event.inputs.arch == 'amd64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}

jobs:
  build-and-publish:
    name: "构建并发布 ISO (${{ github.event.inputs.arch }})"
    runs-on: ${{ github.event.inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: write

    steps:
      - name: "释放 Action 空间"
        if: ${{ github.event.inputs.free_space == 'true' }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: "检出仓库"
        uses: actions/checkout@v6

      - name: "检查模板是否存在"
        id: check_template
        run: |
          TEMPLATE_NAME="${{ github.event.inputs.arch }}-template.iso"
          [[ "${{ github.event.inputs.secure_boot }}" == "true" ]] && TEMPLATE_NAME="${{ github.event.inputs.arch }}-secureboot-template.iso"
          
          if [ -f "templates/${TEMPLATE_NAME}" ]; then
            echo "模板存在：${TEMPLATE_NAME}"
            echo "template_exists=true" >> $GITHUB_OUTPUT
          else
            echo "模板不存在：${TEMPLATE_NAME}"
            echo "template_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: "安装 Rust 工具链"
        # if: ${{ github.event.inputs.use_tui == 'true' }}
        if: ${{ steps.check_template.outputs.template_exists != 'true' || github.event.inputs.no_cache == 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: "安装 Zig"
        # if: ${{ github.event.inputs.use_tui == 'true' }}
        if: ${{ steps.check_template.outputs.template_exists != 'true' || github.event.inputs.no_cache == 'true' }}
        uses: mlugg/setup-zig@v2.1.0
        with:
          version: master

      - name: "安装 MUSL"
        # if: ${{ github.event.inputs.use_tui == 'true' }}
        if: ${{ steps.check_template.outputs.template_exists != 'true' || github.event.inputs.no_cache == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: "Rust 编译缓存"
        # if: ${{ github.event.inputs.use_tui == 'true' }}
        if: ${{ steps.check_template.outputs.template_exists != 'true' || github.event.inputs.no_cache == 'true' }}
        uses: swatinem/rust-cache@v2
        with:
          workspaces: disktui-lite

      - name: "强制清理 Rust 编译缓存"
        # if: ${{ github.event.inputs.use_tui == 'true' && github.event.inputs.no_cache == 'true' }}
        if: ${{ steps.check_template.outputs.template_exists != 'true' || github.event.inputs.no_cache == 'true' }}
        run: cargo clean
        working-directory: disktui-lite

      - name: "构建 disktui-lite"
        # if: ${{ github.event.inputs.use_tui == 'true' }}
        if: ${{ steps.check_template.outputs.template_exists != 'true' || github.event.inputs.no_cache == 'true' }}
        run: |
          cargo install --locked cargo-zigbuild
          cargo zigbuild --release --target ${{ env.TARGET }}
        working-directory: disktui-lite

      - name: "保存 disktui-lite"
        # if: ${{ github.event.inputs.use_tui == 'true' }}
        if: ${{ steps.check_template.outputs.template_exists != 'true' || github.event.inputs.no_cache == 'true' }}
        run: |
          mkdir -p ../binaries
          cp target/${{ env.TARGET }}/release/disktui-lite ../binaries/disktui-lite
        working-directory: disktui-lite

      - name: "设置目标架构"
        run: sed -i "s/^ARCH=.*/ARCH=${{ github.event.inputs.arch }}/" build.env

      - name: "设置 Secure Boot"
        if: ${{ github.event.inputs.secure_boot == 'true' }}
        run: sed -i 's/^ENABLE_SECURE_BOOT=.*/ENABLE_SECURE_BOOT=1/' build.env

      # - name: "设置安装器模式为 Shell"
      #   if: ${{ github.event.inputs.use_tui != 'true' }}
      #   run: sed -i 's/^USE_TUI=.*/USE_TUI=0/' build.env

      - name: "设置 Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "构建 Docker 镜像"
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: imgflash:latest
          cache-from: ${{ github.event.inputs.no_cache != 'true' && 'type=gha' || '' }}
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}

      - name: "从模板快速构建"
        if: ${{ steps.check_template.outputs.template_exists == 'true' && github.event.inputs.no_cache != 'true' }}
        env:
          ARCH: ${{ github.event.inputs.arch }}
          ENABLE_SECURE_BOOT: ${{ github.event.inputs.secure_boot && '1' || '0' }}
        run: |
          ARGS="-u ${{ github.event.inputs.download_url }}"
          [ -n "${{ github.event.inputs.sha256 }}" ] && ARGS="$ARGS -c ${{ github.event.inputs.sha256 }}"
          
          docker run --rm --privileged \
            -v "$(pwd)/build:/build/build" \
            -v "$(pwd)/output:/build/output" \
            -v "$(pwd)/templates:/build/templates" \
            -v "$(pwd)/build.env:/build/build.env" \
            -e ARCH="${ARCH}" \
            -e ENABLE_SECURE_BOOT="${ENABLE_SECURE_BOOT}" \
            imgflash bash build-from-template.sh ${ARGS}

      - name: "完整构建（无模板或强制）"
        if: ${{ steps.check_template.outputs.template_exists != 'true' || github.event.inputs.no_cache == 'true' }}
        run: |
          ARGS="-u ${{ github.event.inputs.download_url }}"
          [ -n "${{ github.event.inputs.sha256 }}" ] && ARGS="$ARGS -c ${{ github.event.inputs.sha256 }}"
          
          docker run --rm --privileged \
            -v "$(pwd)/binaries:/build/binaries" \
            -v "$(pwd)/output:/build/output" \
            -v "$(pwd)/templates:/build/templates" \
            imgflash bash build.sh ${ARGS}

      - name: "获取 ISO 文件名"
        id: iso_file
        run: |
          ISO_FILE=$(ls output/*.iso 2>/dev/null | head -n 1)
          echo "file=${ISO_FILE##*/}" >> $GITHUB_OUTPUT

      - name: "打包为压缩文件"
        id: compress_file
        env:
          COMPRESS_FORMAT: ${{ github.event.inputs.compress_format }}
          RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          case "$COMPRESS_FORMAT" in
            gz)
              gzip -c "output/${{ steps.iso_file.outputs.file }}" > "$RELEASE_NAME.iso.gz"
              echo "file=$RELEASE_NAME.iso.gz" >> $GITHUB_OUTPUT
              echo "content_type=application/gzip" >> $GITHUB_OUTPUT
              ;;
            xz)
              xz -c "output/${{ steps.iso_file.outputs.file }}" > "$RELEASE_NAME.iso.xz"
              echo "file=$RELEASE_NAME.iso.xz" >> $GITHUB_OUTPUT
              echo "content_type=application/x-xz" >> $GITHUB_OUTPUT
              ;;
            bz2)
              bzip2 -c "output/${{ steps.iso_file.outputs.file }}" > "$RELEASE_NAME.iso.bz2"
              echo "file=$RELEASE_NAME.iso.bz2" >> $GITHUB_OUTPUT
              echo "content_type=application/x-bzip2" >> $GITHUB_OUTPUT
              ;;
            zip)
              zip "$RELEASE_NAME.iso.zip" "output/${{ steps.iso_file.outputs.file }}"
              echo "file=$RELEASE_NAME.iso.zip" >> $GITHUB_OUTPUT
              echo "content_type=application/zip" >> $GITHUB_OUTPUT
              ;;
            7z)
              7z a "$RELEASE_NAME.iso.7z" "output/${{ steps.iso_file.outputs.file }}"
              echo "file=$RELEASE_NAME.iso.7z" >> $GITHUB_OUTPUT
              echo "content_type=application/x-7z-compressed" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: "删除旧版 Release 和 Tag"
        env:
          RELEASE_NAME: ${{ github.event.inputs.release_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${RELEASE_NAME}-latest"
          gh release delete "$TAG_NAME" -y || true
          git push origin ":refs/tags/$TAG_NAME" || true

      - name: "创建 GitHub Release 并上传产物"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_name }}-latest
          name: ${{ github.event.inputs.release_name }} ISO
          body: |
            发布名称: ${{ github.event.inputs.release_name }}
            架构: ${{ github.event.inputs.arch }}
            压缩格式: ${{ github.event.inputs.compress_format }}
            Secure Boot: ${{ github.event.inputs.secure_boot == 'true' && '启用' || '未启用' }}
          files: ${{ steps.compress_file.outputs.file }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
