name: "更新构建模板"

on:
  workflow_dispatch:
    inputs:
      amd64:
        description: 'AMD64 模板'
        type: boolean
        default: true
      amd64_secureboot:
        description: 'AMD64 Secure Boot 模板'
        type: boolean
        default: false
      arm64:
        description: 'ARM64 模板'
        type: boolean
        default: false
      arm64_secureboot:
        description: 'ARM64 Secure Boot 模板'
        type: boolean
        default: false

jobs:
  prepare:
    name: "准备构建矩阵"
    runs-on: ubuntu-latest
    outputs:
      arch_matrix: ${{ steps.set-matrix.outputs.arch_matrix }}

    steps:
      - name: "生成构建矩阵"
        id: set-matrix
        run: |
          ARCHS=()
          [[ "${{ github.event.inputs.amd64 }}" == "true" ]] && ARCHS+=(amd64)
          [[ "${{ github.event.inputs.amd64_secureboot }}" == "true" ]] && ARCHS+=(amd64)
          [[ "${{ github.event.inputs.arm64 }}" == "true" ]] && ARCHS+=(arm64)
          [[ "${{ github.event.inputs.arm64_secureboot }}" == "true" ]] && ARCHS+=(arm64)
          UNIQUE=$(echo "${ARCHS[@]}" | tr ' ' '\n' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "arch_matrix=${UNIQUE}" >> $GITHUB_OUTPUT
          echo "需构建架构: $(echo "$UNIQUE" | jq -r '.[]' | tr '\n' ' ')"

  build:
    name: "构建模板 (${{ matrix.arch }})"
    needs: prepare
    if: ${{ needs.prepare.outputs.arch_matrix != '[]' }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        arch: ${{ fromJson(needs.prepare.outputs.arch_matrix) }}
      fail-fast: false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            Dockerfile
            .dockerignore
            binaries
            disktui-lite
            build.env
            create-template.sh
            templates

      - name: "安装编译工具链"
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: "安装 Rust 工具链"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'amd64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}

      - name: "安装 Zig"
        uses: mlugg/setup-zig@v2.1.0
        with:
          version: master

      - name: "Rust 编译缓存"
        uses: swatinem/rust-cache@v2
        with:
          workspaces: disktui-lite

      - name: "构建 disktui-lite"
        run: |
          cd disktui-lite
          TARGET="${{ matrix.arch == 'amd64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}"
          cargo install --locked cargo-zigbuild
          cargo zigbuild --release --target "$TARGET"
          cp target/"$TARGET"/release/disktui-lite ../binaries/

      - name: "设置 Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "构建 Docker 镜像"
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: imgflash:latest

      - name: "构建模板"
        run: |
          VARIANTS=()
          [[ "${{ github.event.inputs.amd64 }}" == "true" && "${{ matrix.arch }}" == "amd64" ]] && VARIANTS+=(plain)
          [[ "${{ github.event.inputs.amd64_secureboot }}" == "true" && "${{ matrix.arch }}" == "amd64" ]] && VARIANTS+=(secureboot)
          [[ "${{ github.event.inputs.arm64 }}" == "true" && "${{ matrix.arch }}" == "arm64" ]] && VARIANTS+=(plain)
          [[ "${{ github.event.inputs.arm64_secureboot }}" == "true" && "${{ matrix.arch }}" == "arm64" ]] && VARIANTS+=(secureboot)
          
          if [[ ${#VARIANTS[@]} -eq 0 ]]; then
            echo "未选择 ${{ matrix.arch }} 模板，跳过"
            exit 0
          fi
          
          BUILD_DIR_HOST="$(pwd)/build/${{ matrix.arch }}"
          mkdir -p "${BUILD_DIR_HOST}"
          
          FIRST=1
          for variant in "${VARIANTS[@]}"; do
            echo ""; echo ">>> 构建 ${{ matrix.arch }}${variant}-template"
            ARGS=(--arch "${{ matrix.arch }}")
            [[ "$variant" == "secureboot" ]] && ARGS+=(--secure-boot)
            [[ "$FIRST" -eq 0 ]] && ARGS+=(--skip-bootstrap)
            
            docker run --rm --privileged \
              -v "$(pwd)/binaries:/build/binaries" \
              -v "$(pwd)/templates:/build/templates" \
              -v "${BUILD_DIR_HOST}:/build/build/${{ matrix.arch }}" \
              -v "$(pwd)/build.env:/build/build.env" \
              --entrypoint bash \
              imgflash create-template.sh "${ARGS[@]}"
            
            FIRST=0
          done

      - name: "提交模板"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add templates/*.iso
          git commit -m "更新 ${{ matrix.arch }} 模板" || true
          git push