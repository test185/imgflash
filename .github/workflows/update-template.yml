name: "更新构建模板"

on:
  workflow_dispatch:
    inputs:
      amd64:
        description: 'AMD64 模板'
        type: boolean
        default: true
      amd64_secureboot:
        description: 'AMD64 Secure Boot 模板'
        type: boolean
        default: false
      arm64:
        description: 'ARM64 模板'
        type: boolean
        default: false
      arm64_secureboot:
        description: 'ARM64 Secure Boot 模板'
        type: boolean
        default: false

jobs:
  build:
    name: "构建模板 (${{ matrix.arch }})"
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false
    permissions:
      contents: write

    steps:
      - name: "检出仓库"
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            binaries
            disktui-lite
            scripts
            build.env
            create-template.sh
            templates

      - name: "安装依赖"
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mmdebstrap xorriso mtools dosfstools

      - name: "安装 Rust 工具链"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'amd64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}

      - name: "安装 Zig"
        uses: mlugg/setup-zig@v2.1.0
        with:
          version: master

      - name: "Rust 编译缓存"
        uses: swatinem/rust-cache@v2
        with:
          workspaces: disktui-lite

      - name: "构建 disktui-lite"
        run: |
          cd disktui-lite
          TARGET="${{ matrix.arch == 'amd64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}"
          cargo build --release --target "$TARGET"
          cp target/"$TARGET"/release/disktui-lite ../binaries/

      - name: "构建模板"
        run: |
          VARIANTS=()
          [[ "${{ github.event.inputs.amd64 }}" == "true" && "${{ matrix.arch }}" == "amd64" ]] && VARIANTS+=(plain)
          [[ "${{ github.event.inputs.amd64_secureboot }}" == "true" && "${{ matrix.arch }}" == "amd64" ]] && VARIANTS+=(secureboot)
          [[ "${{ github.event.inputs.arm64 }}" == "true" && "${{ matrix.arch }}" == "arm64" ]] && VARIANTS+=(plain)
          [[ "${{ github.event.inputs.arm64_secureboot }}" == "true" && "${{ matrix.arch }}" == "arm64" ]] && VARIANTS+=(secureboot)
          
          if [[ ${#VARIANTS[@]} -eq 0 ]]; then
            echo "未选择 ${{ matrix.arch }} 模板，跳过"
            exit 0
          fi
          
          FIRST=1
          for variant in "${VARIANTS[@]}"; do
            echo ""; echo ">>> 构建 ${{ matrix.arch }}${variant}-template"
            ARGS=(--arch "${{ matrix.arch }}")
            [[ "$variant" == "secureboot" ]] && ARGS+=(--secure-boot)
            [[ "$FIRST" -eq 0 ]] && ARGS+=(--skip-bootstrap)
            bash create-template.sh "${ARGS[@]}"
            FIRST=0
          done

      - name: "提交模板"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add templates/*.iso
          git commit -m "更新 ${{ matrix.arch }} 模板" || true
          git push