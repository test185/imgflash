name: "更新 BusyBox 二进制"

on:
  workflow_dispatch:
    inputs:
      busybox_version:
        description: 'BusyBox 版本号（留空则自动检测最新版）'
        required: false
        default: ''

jobs:
  detect:
    name: "检测 BusyBox 版本"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect_version.outputs.version }}
    steps:
      - name: "检测最新 BusyBox 版本"
        if: ${{ github.event.inputs.busybox_version == '' }}
        id: detect_version
        run: |
          BUSYBOX_VERSION=$(curl -sL --fail --retry 3 "https://busybox.net/downloads/" | \
            grep -oP 'busybox-\K\d+\.\d+\.\d+(?=\.tar\.bz2)' | \
            sort -V | tail -1)
          if [ -z "$BUSYBOX_VERSION" ]; then
            echo "ERROR: Failed to detect BusyBox version!"
            exit 1
          fi
          echo "Detected latest version: ${BUSYBOX_VERSION}"
          echo "version=${BUSYBOX_VERSION}" >> $GITHUB_OUTPUT
      - name: "使用手动指定版本"
        if: ${{ github.event.inputs.busybox_version != '' }}
        id: manual_version
        run: |
          echo "version=${{ github.event.inputs.busybox_version }}" >> $GITHUB_OUTPUT

  build:
    name: "编译 ${{ matrix.arch_dir }}"
    needs: detect
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch_dir: AMD64
            runner: ubuntu-latest
          - arch_dir: ARM64
            runner: ubuntu-24.04-arm

    steps:
      - name: "检出仓库"
        uses: actions/checkout@v4

      - name: "下载 BusyBox 源码"
        env:
          BUSYBOX_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          curl -Lf --retry 3 -o busybox.tar.bz2 \
            "https://busybox.net/downloads/busybox-${BUSYBOX_VERSION}.tar.bz2"
          tar xjf busybox.tar.bz2

      - name: "安装 musl 工具链"
        run: sudo apt-get install -y musl-tools

      - name: "编译独立 applet"
        env:
          BUSYBOX_VERSION: ${{ needs.detect.outputs.version }}
          ARCH_DIR: ${{ matrix.arch_dir }}
        run: |
          mkdir -p "binaries/${ARCH_DIR}"
          cd "busybox-${BUSYBOX_VERSION}"

          for applet in MODPROBE MOUNT; do
            echo "Building ${ARCH_DIR} standalone applet: ${applet}..."
            make allnoconfig
            sed -i "s/# CONFIG_${applet} is not set/CONFIG_${applet}=y/" .config
            sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
            sed -i 's/# CONFIG_MODULES is not set/CONFIG_MODULES=y/' .config
            sed -i '/CONFIG_DEFAULT_MODULES_DIR/d' .config
            sed -i '/CONFIG_DEFAULT_DEPMOD_FILE/d' .config
            echo 'CONFIG_DEFAULT_MODULES_DIR="/lib/modules"' >> .config
            echo 'CONFIG_DEFAULT_DEPMOD_FILE="modules.dep"' >> .config
            sed -i 's/CONFIG_SH_IS_ASH=y/# CONFIG_SH_IS_ASH is not set/; s/# CONFIG_SH_IS_NONE is not set/CONFIG_SH_IS_NONE=y/' .config
            sed -i 's/CONFIG_INSTALL_APPLET_SYMLINKS=y/# CONFIG_INSTALL_APPLET_SYMLINKS is not set/; s/# CONFIG_INSTALL_APPLET_DONT is not set/CONFIG_INSTALL_APPLET_DONT=y/' .config
            sed -i 's/# CONFIG_FEATURE_MOUNT_LOOP is not set/CONFIG_FEATURE_MOUNT_LOOP=y/' .config
            sed -i 's/# CONFIG_FEATURE_MOUNT_LOOP_CREATE is not set/CONFIG_FEATURE_MOUNT_LOOP_CREATE=y/' .config
            sed -i 's/# CONFIG_FEATURE_MOUNT_FLAGS is not set/CONFIG_FEATURE_MOUNT_FLAGS=y/' .config
            yes '' | make oldconfig
            grep -q "CONFIG_${applet}=y" .config || { echo "ERROR: CONFIG_${applet} not enabled"; exit 1; }
            echo "=== Enabled applets ==="
            grep '=y' .config | grep -v '^#' || true
            MULTIARCH=$(dpkg-architecture -qDEB_HOST_MULTIARCH)
            make -j$(nproc) CC=musl-gcc EXTRA_CFLAGS="-idirafter /usr/include -idirafter /usr/include/${MULTIARCH}"
            cp busybox "../binaries/${ARCH_DIR}/busybox_${applet}"
            chmod +x "../binaries/${ARCH_DIR}/busybox_${applet}"
          done

          ls -lh "../binaries/${ARCH_DIR}/"

      - name: "提交更改"
        env:
          BUSYBOX_VERSION: ${{ needs.detect.outputs.version }}
          ARCH_DIR: ${{ matrix.arch_dir }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "binaries/${ARCH_DIR}/"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update BusyBox ${ARCH_DIR} binaries to ${BUSYBOX_VERSION}"
          git pull --rebase || true
          git push
