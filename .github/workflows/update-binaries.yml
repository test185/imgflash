name: "更新 BusyBox 二进制"

on:
  workflow_dispatch:
    inputs:
      busybox_version:
        description: 'BusyBox 版本号（留空则自动检测最新版）'
        required: false
        default: ''

jobs:
  detect:
    name: "检测 BusyBox 版本"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect_version.outputs.version }}
    steps:
      - name: "检测最新 BusyBox 版本"
        if: ${{ github.event.inputs.busybox_version == '' }}
        id: detect_version
        run: |
          BUSYBOX_VERSION=$(curl -sL --fail --retry 3 "https://busybox.net/downloads/" | \
            grep -oP 'busybox-\K\d+\.\d+\.\d+(?=\.tar\.bz2)' | \
            sort -V | tail -1)
          if [ -z "$BUSYBOX_VERSION" ]; then
            echo "ERROR: Failed to detect BusyBox version!"
            exit 1
          fi
          echo "Detected latest version: ${BUSYBOX_VERSION}"
          echo "version=${BUSYBOX_VERSION}" >> $GITHUB_OUTPUT
      - name: "使用手动指定版本"
        if: ${{ github.event.inputs.busybox_version != '' }}
        id: manual_version
        run: |
          echo "version=${{ github.event.inputs.busybox_version }}" >> $GITHUB_OUTPUT

  build:
    name: "编译 ${{ matrix.arch_dir }}"
    needs: detect
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch_dir: AMD64
            runner: ubuntu-latest
          - arch_dir: ARM64
            runner: ubuntu-24.04-arm

    steps:
      - name: "检出仓库"
        uses: actions/checkout@v4

      - name: "下载 BusyBox 源码"
        env:
          BUSYBOX_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          echo "Downloading BusyBox source ${BUSYBOX_VERSION}..."
          curl -Lf --retry 3 -o busybox.tar.bz2 \
            "https://busybox.net/downloads/busybox-${BUSYBOX_VERSION}.tar.bz2"
          tar xjf busybox.tar.bz2

      - name: "编译独立 applet"
        env:
          BUSYBOX_VERSION: ${{ needs.detect.outputs.version }}
          ARCH_DIR: ${{ matrix.arch_dir }}
        run: |
          APPLETS="MODPROBE MOUNT"
          mkdir -p "binaries/${ARCH_DIR}"

          cd "busybox-${BUSYBOX_VERSION}"

          # 生成 allnoconfig 基底并启用静态链接
          make allnoconfig
          sed -i 's/CONFIG_STATIC=n/CONFIG_STATIC=y/' .config
          cp .config .config.base

          for applet in ${APPLETS}; do
            echo "Building ${ARCH_DIR} standalone applet: ${applet}..."
            cp .config.base .config
            echo "CONFIG_${applet}=y" >> .config
            if [ "${applet}" != "SH_IS_ASH" ] && [ "${applet}" != "SH_IS_HUSH" ]; then
              echo "CONFIG_SH_IS_NONE=y" >> .config
            fi
            yes '' | make oldconfig
            if ! grep -q "^CONFIG_${applet}=y" .config; then
              echo "  ERROR: CONFIG_${applet} was not enabled after oldconfig!"
              grep "CONFIG_${applet}" .config || true
              exit 1
            fi
            make -j$(nproc)
            if grep -q '^#define NUM_APPLETS 1$' include/NUM_APPLETS.h; then
              cp busybox "../binaries/${ARCH_DIR}/busybox_${applet}"
              chmod +x "../binaries/${ARCH_DIR}/busybox_${applet}"
              echo "  OK: $(ls -lh "../binaries/${ARCH_DIR}/busybox_${applet}" | awk '{print $5}')"
            else
              echo "  WARNING: NUM_APPLETS != 1 for ${applet}, applets in binary:"
              cat include/NUM_APPLETS.h
              cp busybox "../binaries/${ARCH_DIR}/busybox_${applet}"
              chmod +x "../binaries/${ARCH_DIR}/busybox_${applet}"
            fi
          done

      - name: "提交更改"
        env:
          BUSYBOX_VERSION: ${{ needs.detect.outputs.version }}
          ARCH_DIR: ${{ matrix.arch_dir }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "binaries/${ARCH_DIR}/"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update BusyBox ${ARCH_DIR} binaries to ${BUSYBOX_VERSION}"
          git pull --rebase || true
          git push
