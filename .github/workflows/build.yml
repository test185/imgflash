name: "构建 ImgFlash 安装器 ISO"

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '磁盘镜像下载地址（支持 raw / gz / xz / bz2 / zip / 7z）'
        required: true
      arch:
        description: '目标架构'
        type: choice
        options:
          - amd64
          - arm64
        default: amd64
      iso_name:
        description: '输出 ISO 文件名(留空则使用原始名称)'
        required: false
      secure_boot:
        description: '启用 Secure Boot'
        type: boolean
        default: false
      use_tui:
        description: '使用 TUI'
        type: boolean
        default: true
      free_space:
        description: '释放 Action 空间'
        type: boolean
        default: false
      no_cache:
        description: '不使用缓存，强制重新构建'
        type: boolean
        default: false

env:
  TARGET: ${{ github.event.inputs.arch == 'amd64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}

jobs:
  build:
    name: "构建 ISO (${{ github.event.inputs.arch }})"
    runs-on: ubuntu-latest

    steps:
      - name: "释放磁盘空间"
        if: ${{ github.event.inputs.free_space == 'true' }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: "检出仓库"
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            disktui-lite
            build.sh
            scripts
            build.env
            Dockerfile

      - name: "安装 Rust 工具链"
        if: ${{ github.event.inputs.use_tui == 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: "安装 Zig"
        if: ${{ github.event.inputs.use_tui == 'true' }}
        uses: mlugg/setup-zig@v2.1.0
        with:
          version: master

      - name: "安装 MUSL"
        if: ${{ github.event.inputs.use_tui == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: "Rust 编译缓存"
        if: ${{ github.event.inputs.use_tui == 'true' && github.event.inputs.no_cache != 'true' }}
        uses: swatinem/rust-cache@v2
        with:
          workspaces: disktui-lite

      - name: "强制清理 Rust 编译缓存"
        if: ${{ github.event.inputs.use_tui == 'true' && github.event.inputs.no_cache == 'true' }}
        run: cargo clean
        working-directory: disktui-lite

      - name: "构建 disktui-lite"
        if: ${{ github.event.inputs.use_tui == 'true' }}
        run: |
          cargo install --locked cargo-zigbuild
          cargo zigbuild --release --target ${{ env.TARGET }}
        working-directory: disktui-lite

      - name: "保存 disktui-lite"
        if: ${{ github.event.inputs.use_tui == 'true' }}
        run: |
          mkdir -p ../binaries
          cp target/${{ env.TARGET }}/release/disktui-lite ../binaries/disktui-lite
        working-directory: disktui-lite

      - name: "设置目标架构"
        run: sed -i "s/^ARCH=.*/ARCH=${{ github.event.inputs.arch }}/" build.env

      - name: "设置 Secure Boot"
        if: ${{ github.event.inputs.secure_boot == 'true' }}
        run: sed -i 's/^ENABLE_SECURE_BOOT=.*/ENABLE_SECURE_BOOT=1/' build.env

      - name: "设置安装器模式为 Shell"
        if: ${{ github.event.inputs.use_tui != 'true' }}
        run: sed -i 's/^USE_TUI=.*/USE_TUI=0/' build.env

      - name: "设置 Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "构建 Docker 镜像"
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: imgflash:latest
          cache-from: ${{ github.event.inputs.no_cache != 'true' && 'type=gha' || '' }}
          cache-to: ${{ github.event.inputs.no_cache != 'true' && 'type=gha,mode=max' || '' }}

      - name: "构建 ISO"
        run: |
          mkdir -p output binaries
          ARGS="-u ${{ github.event.inputs.download_url }}"
          if [ -n "${{ github.event.inputs.iso_name }}" ]; then
            ARGS="$ARGS -n ${{ github.event.inputs.iso_name }}"
          fi
          docker run --rm --privileged \
            -v "$(pwd)/binaries:/build/binaries" \
            -v "$(pwd)/output:/build/output" \
            imgflash $ARGS

      - name: "上传 ISO 产物"
        uses: actions/upload-artifact@v4
        with:
          name: imgflash-iso-${{ github.event.inputs.arch }}
          path: output/*.iso