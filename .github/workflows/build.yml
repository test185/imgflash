name: "构建 ImgFlash 安装器 ISO"

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '磁盘镜像下载地址（支持 raw / gz / xz / bz2 / zip / 7z）'
        required: true
      arch:
        description: '目标架构'
        type: choice
        options:
          - amd64
          - arm64
        default: amd64
      iso_name:
        description: '输出 ISO 文件名(留空则使用原始名称)'
        required: false
      secure_boot:
        description: '启用 Secure Boot'
        type: boolean
        default: false
      free_space:
        description: '释放 Action 空间'
        type: boolean
        default: false

jobs:
  build:
    name: "构建 ISO (${{ github.event.inputs.arch }})"
    runs-on: ubuntu-latest

    steps:
      - name: "释放磁盘空间"
        if: ${{ github.event.inputs.free_space == 'true' }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: "检出仓库"
        uses: actions/checkout@v4

      - name: "设置目标架构"
        run: sed -i "s/^ARCH=.*/ARCH=${{ github.event.inputs.arch }}/" build.env

      - name: "设置 Secure Boot"
        if: ${{ github.event.inputs.secure_boot == 'true' }}
        run: sed -i 's/^ENABLE_SECURE_BOOT=.*/ENABLE_SECURE_BOOT=1/' build.env

      - name: "构建 Docker 镜像"
        run: docker build -t imgflash .

      - name: "构建 ISO"
        run: |
          mkdir -p output
          ARGS="-u ${{ github.event.inputs.download_url }}"
          if [ -n "${{ github.event.inputs.iso_name }}" ]; then
            ARGS="$ARGS -n ${{ github.event.inputs.iso_name }}"
          fi
          docker run --rm --privileged \
            -v "$(pwd)/output:/build/output" \
            imgflash $ARGS

      - name: "上传 ISO 产物"
        uses: actions/upload-artifact@v4
        with:
          name: imgflash-iso-${{ github.event.inputs.arch }}
          path: output/*.iso